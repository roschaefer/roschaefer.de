version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    groups:
      svelte:
        patterns:
          - "svelte"
          - "@sveltejs/*"
          - "@sveltejs/vite-plugin-svelte"
      styling:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "@fontsource*"
      i18n:
        patterns:
          - "@inlang/*"
      quality:
        patterns:
          - "@biomejs/*"
          - "typescript"
          - "vite"
          - "vitest"
          - "svelte-check"
          - "@types/*"
      package-manager:
        patterns:
          - "pnpm"
