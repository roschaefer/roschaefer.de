name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tool-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Check generated tool versions
        run: |
          nix develop --command sync-version-files
          git diff --exit-code -- .tool-versions .node-version
          git diff --exit-code -G '"packageManager"' -- package.json

  verify:
    runs-on: ubuntu-latest
    needs: tool-versions
    container:
      # Keep this in sync with the @playwright/test version in pnpm-lock.yaml.
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --user 1001
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools from .tool-versions
        uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quick verification
        run: pnpm ready

      - name: Accessibility test
        run: pnpm test:a11y

      - name: Build PDFs
        run: pnpm pdf:build

      - name: Build site
        run: pnpm build

  lighthouse:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools from .tool-versions
        uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production site
        run: pnpm build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          buildCommand: pnpm build
