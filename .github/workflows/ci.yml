name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools from .tool-versions
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Compile Paraglide messages
        run: pnpm paraglide:compile

      - name: Generate resume outputs
        run: pnpm resume:build

      - name: Verify generated files are committed
        run: git diff --exit-code

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm check

      - name: Test
        run: pnpm test:unit

      - name: Accessibility test
        run: pnpm test:a11y

      - name: Build PDFs
        run: pnpm pdf:build

      - name: Build site
        run: pnpm build

  lighthouse:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools from .tool-versions
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production site
        run: pnpm build:prod

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          buildCommand: pnpm build:prod
