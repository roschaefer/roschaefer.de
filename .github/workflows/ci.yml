name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Install dependencies
        run: nix develop --command pnpm install --frozen-lockfile

      - name: Compile Paraglide messages
        run: nix develop --command pnpm paraglide:compile

      - name: Generate resume outputs
        run: nix develop --command pnpm resume:build

      - name: Verify generated files are committed
        run: nix develop --command git diff --exit-code

      - name: Lint
        run: nix develop --command pnpm lint

      - name: Typecheck
        run: nix develop --command pnpm check

      - name: Test
        run: nix develop --command pnpm test:unit

      - name: Accessibility test
        run: nix develop --command pnpm test:a11y

      - name: Build PDFs
        run: nix develop --command pnpm pdf:build

      - name: Build site
        run: nix develop --command pnpm build

  lighthouse:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Install dependencies
        run: nix develop --command pnpm install --frozen-lockfile

      - name: Build production site
        run: nix develop --command pnpm build:prod

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          buildCommand: nix develop --command pnpm build:prod
